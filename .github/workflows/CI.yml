name: CI

# Trigger the workflow on push to main, or on pull request
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        gap-version:
          - devel
          - v4.16
          - v4.15
          - v4.14
          - v4.13
          - v4.12
          - v4.11
          - v4.10
          - v4.9
        exclude:
          - os: macos-latest
            gap-version: v4.9
          - os: macos-latest
            gap-version: v4.10

    steps:
      # the order of the checkout actions is important because all contents of
      # the target folder of the checkout action is removed
      - uses: gap-actions/setup-cygwin@v2
        if: ${{ matrix.os == 'windows-latest' }}
      - uses: actions/checkout@v7
        with:
          repository: gap-packages/example
      - uses: actions/checkout@v7
        with:
          path: this-action/
      - uses: gap-actions/setup-gap@v3
        with:
          gap-version: ${{ matrix.gap-version }}
      - uses: ./this-action/
        with:
          build-suggested-pkgs: 'recursive'
          extra-pkgs: 'json profiling'


  test-ext:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        pkg: [gap-packages/alnuth, stertooy/smallclassnr]
        gap-version:
          - devel
          - v4.15
          - v4.13
          - v4.11

    steps:
      # the order of the checkout actions is important because all contents of
      # the target folder of the checkout action is removed
      - uses: actions/checkout@v7
        with:
          # TODO: use a single package with non-empty TestPackages *and* NeededSystemPackages records
          repository: ${{ matrix.pkg }}
      - uses: actions/checkout@v7
        with:
          path: this-action/
      - uses: gap-actions/setup-gap@v3
        with:
          gap-version: ${{ matrix.gap-version }}
      - uses: ./this-action/
